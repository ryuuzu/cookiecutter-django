{%- if cookiecutter.use_celery == 'y' %}
volumes:
  {{ cookiecutter.project_slug }}_local_redis_data: {}
{%- endif %}

services:
  django:{% if cookiecutter.use_celery == 'y' %} &django{% endif %}
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: {{ cookiecutter.project_slug }}_local_django
    container_name: {{ cookiecutter.project_slug }}_local_django
    depends_on:
      {%- if cookiecutter.use_celery == 'y' %}
      - redis
      {%- endif %}
    volumes:
      - /app/.venv
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
    ports:
      - '8000:8000'
    command: /start

  # Postgres is run locally by default; the containerized postgres service
  # has been removed. Keep ./.envs/.local/.postgres in your environment if
  # you still maintain DB credentials there.
  {%- if cookiecutter.use_celery == 'y' %}

  redis:
    image: docker.io/redis:7.2
    container_name: {{ cookiecutter.project_slug }}_local_redis
    volumes:
      - {{ cookiecutter.project_slug }}_local_redis_data:/data

  celeryworker: &nobuild
    <<: *django
    build: !reset null      # ← remove inherited build block
    image: {{ cookiecutter.project_slug }}_local_django
    container_name: {{ cookiecutter.project_slug }}_local_celeryworker
    depends_on:
      - redis
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *nobuild
    image: {{ cookiecutter.project_slug }}_local_django
    container_name: {{ cookiecutter.project_slug }}_local_celerybeat
    depends_on:
      - redis
    ports: []
    command: /start-celerybeat

  flower:
    <<: *nobuild
    image: {{ cookiecutter.project_slug }}_local_django
    container_name: {{ cookiecutter.project_slug }}_local_flower
    ports:
      - '5555:5555'
    command: /start-flower
  {%- endif %}
